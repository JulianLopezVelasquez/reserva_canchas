# CONFIGURACIÓN DE BASE DE DATOS H2 PERSISTENTE (ARCHIVO)
# Cambiamos 'mem:reservadb' por 'file:./data/reservadb'
spring.datasource.url=jdbc:h2:file:./data/reservadb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# IMPORTANTE: 'update' crea las tablas si no existen, pero NO borra los datos guardados
spring.jpa.hibernate.ddl-auto=update

# Para que podamos ver la consola de H2 en el navegador
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# CONFIGURACIÓN DE SEGURIDAD
jwt.secret=MiClaveSuperSecretaDeAlMenosTreintaYDosCaracteresParaCanchasApp123!

# Mostrar los SQL en consola (opcional, sirve para debugear)
spring.jpa.show-sql=true